<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hypercloud | {% block title %}{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <aside class="sidebar">
        <h2>Hypercloud</h2>
        <ul class="nav-links">
            <li class="nav-item"><a href="/" class="nav-link {% if active_page == 'dashboard' %}active{% endif %}">Dashboard</a></li>
            <li class="nav-item"><a href="/services" class="nav-link {% if active_page == 'services' %}active{% endif %}">Price Board</a></li>
            <li class="nav-item"><a href="/customers" class="nav-link {% if active_page == 'customers' %}active{% endif %}">Customers</a></li>
            <li class="nav-item"><a href="/usage" class="nav-link {% if active_page == 'usage' %}active{% endif %}">Usage Logs</a></li>
            <li class="nav-item"><a href="/invoices" class="nav-link {% if active_page == 'invoices' %}active{% endif %}">Invoices</a></li>
        </ul>
    </aside>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    {% block scripts %}{% endblock %}
</body>
</html>
